<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Searcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #202124;
            margin: 0;
            color: #fff;
        }
        .container {
            background: #303134;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
        }
        input[type="text"] {
            width: 350px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #5f6368;
            border-radius: 6px;
            font-size: 16px;
            background-color: #202124;
            color: white;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #8ab4f8;
        }
        button {
            padding: 12px 24px;
            background-color: #8ab4f8;
            color: #202124;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #aecbfa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Secret Searcher</h2>
    <input type="text" id="userInput" placeholder="Enter a URL or search term..." onkeypress="handleKeyPress(event)">
    <br>
    <button onclick="launch()">Open in new tab</button>
</div>

<script>
    // Helper function to guess if the input is a URL
    function isUrl(text) {
        if (text.includes(' ')) return false;
        return text.includes('.') || text.startsWith('http://') || text.startsWith('https://');
    }

    function launch() {
        let input = document.getElementById('userInput').value.trim();
        if (!input) return;

        let targetUrl = '';

        if (isUrl(input)) {
            // Prepend https:// if the user forgot it
            if (!input.startsWith('http://') && !input.startsWith('https://')) {
                targetUrl = 'https://' + input;
            } else {
                targetUrl = input;
            }
        } else {
            // Treat the input as a Google search query
            targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }

        // Open a new about:blank tab
        let newTab = window.open('about:blank', '_blank');

        if (newTab) {
            // Apply styles to the new blank tab's body
            newTab.document.body.style.margin = '0';
            newTab.document.body.style.padding = '0';
            newTab.document.body.style.height = '100vh';
            newTab.document.body.style.overflow = 'hidden';
            newTab.document.body.style.backgroundColor = '#fff';

            // Create and inject the iframe
            const iframe = newTab.document.createElement('iframe');
            iframe.src = targetUrl;
            iframe.style.border = 'none';
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';

            newTab.document.body.appendChild(iframe);
            
            // Optional: You can force the title of the blank tab so it doesn't say "about:blank" on the tab itself
            newTab.document.title = "Search"; 
        } else {
            alert('Pop-up blocked! Please allow pop-ups for this site to open new tabs.');
        }
    }

    // Allow hitting "Enter" to trigger the button
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            launch();
        }
    }
</script>

</body>
</html>
